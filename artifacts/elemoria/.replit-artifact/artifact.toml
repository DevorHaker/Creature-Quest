kind = "web"
previewPath = "/"
title = "Elemoria: Rise of the Pokemon"
version = "1.0.0"
id = "artifacts/elemoria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19706

[services.development]
run = "pnpm --filter @workspace/elemoria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elemoria", "run", "build" ]
publicDir = "artifacts/elemoria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19706"
BASE_PATH = "/"
